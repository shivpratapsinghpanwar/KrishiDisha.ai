<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin Dashboard{% endblock %}</title>
    
    <!-- Include Bootstrap for styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css">

    <!-- Google Translate Script -->
    
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <!-- Include Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>

    <!-- Custom CSS for Google Translate and dropdown -->
    
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-success fixed-top">
    <div class="container">
        <!-- Professional Logo Alignment -->
        <a class="navbar-brand d-flex align-items-center">
            <img src="/static/images/logo1.png" alt="Logo" class="logo me-2">
            <span class="fw-bold">KrishiDisha</span>
        </a>

        <!-- Navbar Toggler for mobile view -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link active" href="{{ url_for('create_farmer') }}">Create New Farmer</a>
                 </li>
                 <li class="nav-item">
                  <a class="nav-link active" href="{{ url_for('create_admin') }}">Create New Admin</a>
               </li>
                <li class="nav-item">
                    <a class="nav-link active" href="{{ url_for('admin_logout') }}">Admin Logout</a>
                </li>
                
            </ul>
        </div>
    </div>
  </nav>

  <div class="container mt-5">
    {% block content %}
      <!-- Flash Messages -->
      {% with messages = get_flashed_messages(with_categories=True) %}
        {% if messages %}
          <div>
              {% for category, message in messages %}
                  <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                      {{ message }}
                      <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                  </div>
              {% endfor %}
          </div>
        {% endif %}
      {% endwith %}
    {% endblock %}
  </div>


</body>
</html>
