{% extends "base.html" %}

{% block title %}Update Farmer{% endblock %}

{% block content %}
<nav class="navbar navbar-expand-lg navbar-dark bg-success fixed-top">
  <div class="container">
      <!-- Professional Logo Alignment -->
      <a class="navbar-brand d-flex align-items-center">
          <img src="/static/images/logo1.png" alt="Logo" class="logo me-2">
          <span class="fw-bold">CropWise</span>
      </a>

      <!-- Navbar Toggler for mobile view -->
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
          <ul class="navbar-nav">
              <li class="nav-item">
                  <a class="nav-link active" href="{{ url_for('admin_logout') }}">Admin Logout</a>
              </li>
          </ul>
      </div>
  </div>
</nav>
<br>
<div class="registration-container">
    <!-- Logo Section -->
    <div class="logo-container">
      <img src="/static/images/logo1.png" alt="Logo">
    </div>
<div class="wrapper">
    <h2>Update Farmer Information</h2>
    <form method="POST">
      <div class="input-box">
        
        <input type="text" class="form-control" id="name" name="name" value="{{ farmer.name }}" required>
      </div>
      <div class="input-box">
        
        <input type="email" class="form-control" id="email" name="email" value="{{ farmer.email }}" required>
      </div>
      <div class="input-box">       
        
        <input type="text" class="form-control" id="phone" name="phone" value="{{ farmer.phone }}" required>
      </div>
      <div class="input-box"> 
        <input type="text" class="form-control" id="username" name="username" value="{{ farmer.username }}" required>
      </div>
      <div class="text">
        <button type="submit" class="btn btn-primary">Update Farmer</button>
        <a href="{{ url_for('admin_dashboard')}}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
